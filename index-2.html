html{scroll-behavior:smooth}

.atab{background:transparent;border:1.5px solid rgba(232,101,26,0.2);border-radius:10px;padding:6px 13px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:all .2s;font-family:'Outfit',sans-serif}

.bp{background:linear-gradient(135deg,var(--orange),var(--orange2));color:white;border:none;border-radius:12px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer;transition:all .25s;font-family:'Outfit',sans-serif}
.bp:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(232,101,26,0.33)}
.bd{background:rgba(220,50,50,0.1);color:#cc3333;border:1px solid rgba(220,50,50,0.24);border-radius:9px;padding:5px 9px;cursor:pointer;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif;transition:all .2s}

.bs{background:rgba(232,101,26,0.1);color:var(--orange);border:1px solid rgba(232,101,26,0.24);border-radius:9px;padding:5px 9px;cursor:pointer;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif}
.uz{border:2px dashed rgba(232,101,26,0.3);border-radius:13px;padding:28px;text-align:center;cursor:pointer;transition:all .2s}

.md{background:var(--cream);border:1px solid rgba(232,101,26,0.15);border-radius:22px;padding:26px;max-width:460px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 40px 100px rgba(100,50,0,0.22);animation:floatUp .3s ease}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:680px){
  .stats{grid-template-columns:repeat(2,1fr)}

<script type="module">

import{getFirestore,doc,getDoc,setDoc,collection,getDocs,addDoc,deleteDoc,updateDoc,serverTimestamp,query,orderBy}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const FC={
  apiKey:"AIzaSyCzX6CeUzvcdlKLbTUqShJ9J4Yn3QtRol4",
  authDomain:"only-mens-d0278.firebaseapp.com",
  projectId:"only-mens-d0278",
  storageBucket:"only-mens-d0278.firebasestorage.app",

  appId:"1:602046012135:web:9a8efbd83d0c0629a5e042"
};
const app=initializeApp(FC);
const auth=getAuth(app);
const db=getFirestore(app);
const gp=new GoogleAuthProvider();
const IK="84f30535d380a2a44ecb54b759da3e1d";

async function ib(file){
  const fd=new FormData();fd.append("image",file);
  const r=await fetch("https://api.imgbb.com/1/upload?key="+IK,{method:"POST",body:fd});
  const d=await r.json();
  if(d.success)return d.data.url;
  throw new Error("ImgBB upload failed");
}

const MB={
  "1ep22is007":{name:"Akshay Kumar",emoji:"👑",isAdmin:true},
  "1ep22is006":{name:"Akhilesh",emoji:"🦁",isAdmin:false},
  "1ep22is043":{name:"Hithesh G V",emoji:"🎸",isAdmin:false},
  "1ep22is061":{name:"Mahendra S",emoji:"⚡",isAdmin:false},
  "1ep22is064":{name:"Manush R",emoji:"🎯",isAdmin:false},
  "1ep22is088":{name:"Rohan J",emoji:"🚀",isAdmin:false},
  "1ep22is084":{name:"Shiva Shankar",emoji:"🔱",isAdmin:false},
  "1ep22is108":{name:"Srikanth S",emoji:"🌊",isAdmin:false},
  "1ep22is106":{name:"Sreevasta S P",emoji:"🦅",isAdmin:false},
  "1ep22is119":{name:"Vignesh S R",emoji:"💡",isAdmin:false},

  "1ep22is124":{name:"Y M Ullas",emoji:"🌟",isAdmin:false},
  "1ep22is080":{name:"Prithvi Raj D",emoji:"🏹",isAdmin:false},
  "1ep22is065":{name:"Vikram",emoji:"🏔️",isAdmin:false}
};

function getUSN(email){return(email||"").split("@")[0].toLowerCase()}
function getMB(email){return MB[getUSN(email)]||null}
function ok(email){return!!(email&&email.endsWith("@eastpoint.ac.in")&&getMB(email))}

let S={loading:true,user:null,denied:false,page:"home",atab:"members",
  members:[],trips:[],vibes:[],gallery:[],blocks:[],modal:null,toast:null};

function set(p){Object.assign(S,p);draw()}

onAuthStateChanged(auth,async function(u){
  if(!u){set({loading:false,user:null,denied:false});return}
  if(!ok(u.email)){await signOut(auth);set({loading:false,user:null,denied:true});return}
  const usn=getUSN(u.email);
  const info=getMB(u.email);
  const ref=doc(db,"users",usn);
  const snap=await getDoc(ref);
  const data={name:info.name,email:u.email,usn,emoji:info.emoji,isAdmin:info.isAdmin,lastLogin:serverTimestamp()};
  if(!snap.exists())data.joinedAt=serverTimestamp();
  await setDoc(ref,data,{merge:true});
  const ph=snap.exists()?(snap.data().profilePhoto||""):"";
  set({loading:false,user:{usn,name:info.name,emoji:info.emoji,isAdmin:info.isAdmin,profilePhoto:ph,email:u.email}});
  loadAll();
});

async function loadAll(){
  const[ms,ts,vs,gs,bs]=await Promise.all([
    getDocs(collection(db,"users")),
    getDocs(query(collection(db,"trips"),orderBy("date","asc"))),
    getDocs(query(collection(db,"vibes"),orderBy("createdAt","desc"))),
    getDocs(query(collection(db,"gallery"),orderBy("uploadedAt","desc"))),
    getDocs(query(collection(db,"homeBlocks"),orderBy("order","asc")))
  ]);
  set({
    members:ms.docs.map(d=>({id:d.id,...d.data()})),
    trips:ts.docs.map(d=>({id:d.id,...d.data()})),
    vibes:vs.docs.map(d=>({id:d.id,...d.data()})),
    gallery:gs.docs.map(d=>({id:d.id,...d.data()})),
    blocks:bs.docs.map(d=>({id:d.id,...d.data()}))
  });
}

function showToast(msg){set({toast:msg});setTimeout(()=>set({toast:null}),3000)}

function av(photo,emoji,name,sz){
  sz=sz||48;
  if(photo)return`<img src="${photo}" style="width:${sz}px;height:${sz}px;border-radius:50%;object-fit:cover;border:2.5px solid var(--orange)" onerror="this.style.display='none'">`;
  return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:linear-gradient(135deg,var(--peach),var(--orange2));display:flex;align-items:center;justify-content:center;font-size:${Math.round(sz*.38)}px;border:2.5px solid var(--orange)">${emoji||(name||"?")[0]}</div>`;
}

function draw(){
  const root=document.getElementById("root");
  if(!root)return;

  if(S.loading){
    root.innerHTML=`<div class="loader"><div style="font-size:54px;animation:pulse 1.5s ease infinite">🔥</div><div class="spin" style="margin-top:14px"></div><div style="font-size:13px;color:var(--muted);margin-top:10px;font-weight:500">Loading Only Mens…</div></div>`;
    return;
  }

  if(!S.user){
    if(S.denied){
      root.innerHTML=`<div class="denied"><div style="font-size:68px;animation:pulse 2s ease infinite">🚫</div><h2 style="font-family:'Playfair Display',serif;font-size:30px;margin-top:14px">Access Denied</h2><p style="color:var(--muted);margin-top:8px;font-size:13px">Only 1EP22IS gang members allowed.</p><button class="bp" style="margin-top:20px" id="tryBtn">← Try Another Account</button></div>`;
      document.getElementById("tryBtn").onclick=()=>set({denied:false});
    }else{
      const chips=Object.values(MB).map(m=>`<div class="chip">${m.emoji} ${m.name.split(" ")[0]}</div>`).join("");

function pHome(){
  const u=S.user;

  const mb=S.members.find(m=>m.usn===u.usn)||{};
  const stats=[
    {icon:"👥",val:S.members.length,label:"Brothers"},
    {icon:"🗺️",val:S.trips.filter(t=>t.status==="completed").length,label:"Adventures"},
    {icon:"💬",val:S.vibes.length,label:"Vibes"},

  const tripBox=up?`<div class="tbox"><div style="font-size:10px;letter-spacing:3px;color:var(--orange);font-weight:700;text-transform:uppercase;margin-bottom:9px">⏳ Next Adventure</div><div style="display:flex;flex-wrap:wrap;gap:16px;align-items:center"><div style="text-align:center"><div class="cdown">${dl}</div><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px">days to go</div></div><div><div style="font-family:'Playfair Display',serif;font-size:19px;font-weight:900">${up.name}</div><div style="color:var(--muted);font-size:12px;margin-top:3px">📍 ${up.location||""} · 📅 ${up.date||""}</div>${up.description?`<div style="font-size:13px;color:var(--mid);margin-top:5px;line-height:1.5">${up.description}</div>`:""}</div></div></div>`:"";

  let blocksHTML="";

    blocksHTML=`<div style="margin-top:4px"><div style="font-size:10px;letter-spacing:3px;color:var(--orange);font-weight:700;text-transform:uppercase;margin-bottom:15px">📰 From The Gang</div>`;
    S.blocks.forEach((b,i)=>{
      const even=i%2===0;
      const imgEl=b.imageUrl?`<div class="bimg"><img src="${b.imageUrl}" alt="${b.title||""}"></div>`:"";
      const txtEl=`<div class="btxt"><div class="btag">${b.tag||""}</div><div class="bttl">${b.title||""}</div><div class="bbod">${b.text||""}</div>${b.date?`<div style="font-size:11px;color:var(--muted)">📅 ${b.date}</div>`:""}</div>`;
      blocksHTML+=`<div class="bwrap" style="flex-direction:${even?"row":"row-reverse"};animation:floatUp .5s ${i*.1}s ease both;opacity:0">${even?imgEl+txtEl:txtEl+imgEl}</div>`;
    });

    blocksHTML=`<div style="text-align:center;padding:32px;border:2px dashed rgba(232,101,26,0.2);border-radius:16px;margin-top:4px"><div style="font-size:34px">📰</div><div style="color:var(--muted);font-size:13px;margin-top:7px">Admin can add home sections from Admin → Home Sections.</div></div>`;
  }

  if(m.type==="member"){
    const mb=S.members.find(x=>x.usn===m.usn)||{};
    return`<div class="mo" id="mo"><div class="md"><button class="lout" id="mc" style="float:right">✕</button><div style="text-align:center;margin-bottom:16px">${av(mb.profilePhoto,mb.emoji,mb.name,84)}<div style="font-family:'Playfair Display',serif;font-size:21px;font-weight:900;margin-top:10px">${mb.name||""}</div>${mb.isAdmin?'<div class="abadge">👑 Admin</div>':""}</div><div style="background:var(--warm);border-radius:11px;padding:13px">${[["📋 USN",(mb.usn||"").toUpperCase()],["📧 Email",mb.email||"—"],["💬 Bio",mb.bio||"No bio yet"]].map(r=>`<div style="display:flex;gap:8px;margin-bottom:6px;font-size:13px"><span style="color:var(--muted);min-width:68px">${r[0]}</span><span style="color:var(--mid);font-weight:500">${r[1]}</span></div>`).join("")}</div><button class="bp" id="mc2" style="width:100%;margin-top:13px">Close</button></div></div>`;
  }
  if(m.type==="gallery"){
    return`<div class="mo" id="mo"><div class="md" style="max-width:660px"><button class="lout" id="mc" style="float:right">✕</button><img src="${m.url}" style="width:100%;border-radius:11px;max-height:66vh;object-fit:contain;margin-top:7px">${m.caption?`<div style="text-align:center;margin-top:9px;color:var(--mid);font-size:13px">${m.caption}</div>`:""}</div></div>`;
  }
  return"";
}

function bind(){
  // nav
  document.querySelectorAll("[data-pg]").forEach(el=>el.addEventListener("click",()=>set({page:el.dataset.pg})));
  const lo=document.getElementById("loBtn");
  if(lo)lo.addEventListener("click",()=>signOut(auth));
  // modal close
  ["mo","mc","mc2"].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener("click",e=>{if(e.target===el||id!=="mo")set({modal:null})});
  });
  // member cards
  document.querySelectorAll("[data-mid]").forEach(el=>el.addEventListener("click",()=>set({modal:{type:"member",usn:el.dataset.mid}})));
  // gallery
  document.querySelectorAll("[data-gid]").forEach(el=>el.addEventListener("click",()=>{
    const g=S.gallery.find(x=>x.id===el.dataset.gid);
    if(g)set({modal:{type:"gallery",url:g.url,caption:g.caption}});
  }));
  // vote
  document.querySelectorAll("[data-vid]").forEach(el=>el.addEventListener("click",async()=>{
    const v=S.vibes.find(x=>x.id===el.dataset.vid);
    if(!v)return;
    await updateDoc(doc(db,"vibes",el.dataset.vid),{votes:(v.votes||0)+1});
    const snp=await getDocs(query(collection(db,"vibes"),orderBy("createdAt","desc")));
    set({vibes:snp.docs.map(d=>({id:d.id,...d.data()}))});
  }));
  // post vibe
  const pv=document.getElementById("postVibe");
  if(pv)pv.addEventListener("click",async()=>{
    const txt=(document.getElementById("vtxt")||{}).value||"";
    const tag=(document.getElementById("vtag")||{}).value||"random";
    if(!txt.trim())return;
    await addDoc(collection(db,"vibes"),{text:txt.trim(),tag,votes:0,authorUsn:S.user.usn,authorName:S.user.name,date:new Date().toISOString().slice(0,10),createdAt:serverTimestamp()});
    showToast("🔥 Vibe posted!");
    const snp=await getDocs(query(collection(db,"vibes"),orderBy("createdAt","desc")));
    set({vibes:snp.docs.map(d=>({id:d.id,...d.data()}))});
  });
  // admin tabs
  document.querySelectorAll("[data-at]").forEach(el=>el.addEventListener("click",()=>set({atab:el.dataset.at})));
  // save bio
  const sb=document.getElementById("saveBio");
  if(sb)sb.addEventListener("click",async()=>{
    const u2=(document.getElementById("bioSel")||{}).value||"";
    const bio=((document.getElementById("bioTxt")||{}).value||"").trim();
    const st=document.getElementById("bioSt");
    if(!u2){if(st)st.innerHTML='<div class="serr">Select a member.</div>';return}
    await updateDoc(doc(db,"users",u2),{bio});
    if(st)st.innerHTML='<div class="sok">✅ Bio saved!</div>';
    showToast("✅ Bio updated!");
    const snp=await getDocs(collection(db,"users"));
    set({members:snp.docs.map(d=>({id:d.id,...d.data()}))});
  });
  // edit bio prefill
  document.querySelectorAll("[data-eb]").forEach(el=>el.addEventListener("click",()=>{
    set({atab:"members"});
    setTimeout(()=>{
      const sel=document.getElementById("bioSel");
      const ta=document.getElementById("bioTxt");
      const mb=S.members.find(m=>m.usn===el.dataset.eb);
      if(sel)sel.value=el.dataset.eb;
      if(ta&&mb)ta.value=mb.bio||"";
    },100);
  }));
  // add trip
  const at=document.getElementById("addTrip");
  if(at)at.addEventListener("click",async()=>{
    const n=((document.getElementById("tN")||{}).value||"").trim();
    const l=((document.getElementById("tL")||{}).value||"").trim();
    const d=(document.getElementById("tD")||{}).value||"";
    const s=(document.getElementById("tS")||{}).value||"upcoming";
    const dc=((document.getElementById("tDc")||{}).value||"").trim();
    const st=document.getElementById("tripSt");
    if(!n){if(st)st.innerHTML='<div class="serr">Trip name required.</div>';return}
    await addDoc(collection(db,"trips"),{name:n,location:l,date:d,status:s,description:dc,createdAt:serverTimestamp()});
    showToast("✅ Trip added!");
    const snp=await getDocs(query(collection(db,"trips"),orderBy("date","asc")));
    set({trips:snp.docs.map(d=>({id:d.id,...d.data()})),atab:"trips"});
  });
  // del trip
  document.querySelectorAll("[data-dt]").forEach(el=>el.addEventListener("click",async()=>{
    if(!confirm("Delete trip?"))return;
    await deleteDoc(doc(db,"trips",el.dataset.dt));
    const snp=await getDocs(query(collection(db,"trips"),orderBy("date","asc")));
    set({trips:snp.docs.map(d=>({id:d.id,...d.data()}))});
  }));
  // gallery zone
  const gz=document.getElementById("gz"),gf=document.getElementById("gf");
  if(gz&&gf){gz.addEventListener("click",()=>gf.click());gf.addEventListener("change",()=>{const fn=document.getElementById("gfn");if(fn)fn.textContent=gf.files.length+" file(s) selected"});}
  const ug=document.getElementById("upGal");
  if(ug)ug.addEventListener("click",async()=>{
    const files=(document.getElementById("gf")||{}).files;
    const cap=((document.getElementById("gcap")||{}).value||"").trim();
    const trip=(document.getElementById("gtrip")||{}).value||"";
    const st=document.getElementById("galSt");
    if(!files||!files.length){if(st)st.innerHTML='<div class="serr">Select images first.</div>';return}
    if(st)st.innerHTML=`<div class="sload">⏳ Uploading ${files.length} file(s)...</div>`;
    try{
      for(let i=0;i<files.length;i++){
        const url=await ib(files[i]);
        await addDoc(collection(db,"gallery"),{url,caption:cap,trip,uploadedAt:serverTimestamp(),uploadedBy:S.user.usn});
      }
      if(st)st.innerHTML='<div class="sok">✅ Uploaded!</div>';
      showToast("✅ "+files.length+" photo(s) uploaded!");
      const snp=await getDocs(query(collection(db,"gallery"),orderBy("uploadedAt","desc")));
      set({gallery:snp.docs.map(d=>({id:d.id,...d.data()}))});
    }catch(e){if(st)st.innerHTML=`<div class="serr">❌ ${e.message}</div>`}
  });
  // del gallery
  document.querySelectorAll("[data-di]").forEach(el=>el.addEventListener("click",async()=>{
    if(!confirm("Delete photo?"))return;
    await deleteDoc(doc(db,"gallery",el.dataset.di));
    const snp=await getDocs(query(collection(db,"gallery"),orderBy("uploadedAt","desc")));
    set({gallery:snp.docs.map(d=>({id:d.id,...d.data()}))});
  }));
  // profile zone
  const pz=document.getElementById("pz"),pf=document.getElementById("pf");
  if(pz&&pf){pz.addEventListener("click",()=>pf.click());pf.addEventListener("change",()=>{const fn=document.getElementById("pfn");if(fn&&pf.files[0])fn.textContent=pf.files[0].name});}
  const up=document.getElementById("upProf");
  if(up)up.addEventListener("click",async()=>{
    const u2=(document.getElementById("pSel")||{}).value||"";
    const file=((document.getElementById("pf")||{}).files||[])[0];
    const st=document.getElementById("profSt");
    if(!u2||!file){if(st)st.innerHTML='<div class="serr">Select member and photo.</div>';return}
    if(st)st.innerHTML='<div class="sload">⏳ Uploading...</div>';
    try{
      const url=await ib(file);
      await updateDoc(doc(db,"users",u2),{profilePhoto:url});
      if(st)st.innerHTML='<div class="sok">✅ Profile updated!</div>';
      showToast("✅ Profile photo saved!");
      const snp=await getDocs(collection(db,"users"));
      set({members:snp.docs.map(d=>({id:d.id,...d.data()}))});
    }catch(e){if(st)st.innerHTML=`<div class="serr">❌ ${e.message}</div>`}
  });
  // block zone
  const bz=document.getElementById("bz"),bf=document.getElementById("bf");
  if(bz&&bf){bz.addEventListener("click",()=>bf.click());bf.addEventListener("change",()=>{const fn=document.getElementById("bfn");if(fn&&bf.files[0])fn.textContent=bf.files[0].name});}
  const ab=document.getElementById("addBlk");
  if(ab)ab.addEventListener("click",async()=>{
    const tag=((document.getElementById("bTag")||{}).value||"").trim();
    const ttl=((document.getElementById("bTtl")||{}).value||"").trim();
    const txt=((document.getElementById("bTxt")||{}).value||"").trim();
    const dt=(document.getElementById("bDt")||{}).value||"";
    const ord=parseInt((document.getElementById("bOrd")||{}).value||"1");
    const file=((document.getElementById("bf")||{}).files||[])[0];
    const st=document.getElementById("blkSt");
    if(!ttl){if(st)st.innerHTML='<div class="serr">Title required.</div>';return}
    if(st)st.innerHTML='<div class="sload">⏳ Saving...</div>';
    try{
      let imgUrl="";
      if(file)imgUrl=await ib(file);
      await addDoc(collection(db,"homeBlocks"),{title:ttl,text:txt,tag,date:dt,order:ord,imageUrl:imgUrl,createdAt:serverTimestamp()});
      if(st)st.innerHTML='<div class="sok">✅ Section added!</div>';
      showToast("✅ Home section added!");
      const snp=await getDocs(query(collection(db,"homeBlocks"),orderBy("order","asc")));
      set({blocks:snp.docs.map(d=>({id:d.id,...d.data()}))});
    }catch(e){if(st)st.innerHTML=`<div class="serr">❌ ${e.message}</div>`}
  });
  // del block
  document.querySelectorAll("[data-db]").forEach(el=>el.addEventListener("click",async()=>{
    if(!confirm("Delete section?"))return;
    await deleteDoc(doc(db,"homeBlocks",el.dataset.db));
    const snp=await getDocs(query(collection(db,"homeBlocks"),orderBy("order","asc")));
    set({blocks:snp.docs.map(d=>({id:d.id,...d.data()}))});
  }));
}

setTimeout(()=>{if(S.loading)set({loading:false})},5000);
draw();
</script>
</body>
</html>
